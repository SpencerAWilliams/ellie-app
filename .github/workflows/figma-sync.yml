## ── VISION PATH (PNG / image file) ────────────────────────────────────────

## Step V — Analyse the image and generate a vision schema

Tell the user upfront:
> "I'm working from a screenshot, so spacing and color values will be my best
> visual estimate. For pixel-perfect output with real token names, use the
> Figma MCP plugin or share the Figma URL instead."

### V1 — Analyse the image

Work through each category:

**Layout** — overall structure (columns, rows, sections); estimate padding
(small ~8px, medium ~16px, large ~24–32px); estimate gaps; flex direction
per container.

**Colors** — every distinct background, text, border, and accent color;
estimate hex values; name descriptively (`--color-primary`, `--color-surface`,
`--color-text-muted`).

**Typography** — estimate font sizes (headline, subhead, body, caption in px);
identify weight (300/400/500/600/700); note font face if recognisable; note
text alignment.

**Components** — list every distinct UI element (button, input, card, badge,
icon, image, nav item); for each: shape, color, size, visible states.

**Assets** — describe icons by shape/meaning; mark as `[asset: icon-name]`
placeholders in the tree.

### V2 — Write the vision schema

```python
import json

schema = {
  "meta": {
    "file_key": "vision-input",
    "target_node": None,
    "component_name": "<name inferred from image>",
    "source": "vision",
    "accuracy": "estimated"
  },
  "tokens": {
    "colors":     { "--color-primary": "#...", },
    "typography": { "--font-size-body": "14px", },
    "spacing":    { "--space-md": "16px", },
    "radii":      { "--radius-md": "8px" },
    "shadows":    {}
  },
  "tree": { },  # inferred component tree
  "assets": {}
}

with open("/tmp/figma_schema.json", "w") as f:
    json.dump(schema, f, indent=2)
```

Tree rules: top-level node is always a `FRAME`; use descriptive names matching
what you see; include exact visible text as `content`; mark image placeholders
with `"is_image": true`. Proceed to Step 4.

---

## ── CODE GENERATION (all paths) ───────────────────────────────────────────

## Step 4 — Generate the code

With `/tmp/figma_schema.json` assembled, generate the component. The schema
is the authoritative source — do not invent values.

### Output file set

Write to the directory the user specifies, or default to
`./components/<ComponentName>/`:

```
<ComponentName>/
  index.tsx                    # React + TypeScript (default)
  <ComponentName>.module.css   # CSS Modules
  tokens.css                   # CSS custom properties
  assets/                      # Downloaded images/SVGs
  README.md                    # Source, tokens, date
```

For plain HTML/CSS output: `index.html` + `styles.css`. For Vue: `.vue` SFC.
Always include `tokens.css`.

### Code generation rules

1. **Token names are sacred.** For MCP path: every `var(--token-name)` from
   the MCP context must appear verbatim in the generated code and in
   `tokens.css`. Never replace with a hardcoded value. For API/Vision paths:
   every value must reference a `--*` variable from the schema.

2. **Reproduce layout exactly.** Flex containers get `flex-direction`, `gap`,
   `padding`, `justify-content`, and `align-items` from the schema. Frames
   without auto-layout get absolute positioning with exact px values.

3. **Use semantic HTML.** Map names to elements:
   - "button", "cta", "btn" → `<button>`
   - "input", "field" → `<input>` inside `<label>`
   - "image", "img", "photo", "thumbnail", "avatar" → `<img>`
   - "icon" → `<svg>` inline or `<img>` if raster
   - "h1"–"h6", "heading", "display" → matching `<h*>`
   - "label", "caption", "overline" → `<span>`
   - "paragraph", "body", "description" → `<p>`
   - "nav", "navbar" → `<nav>`
   - "header" → `<header>`, "footer" → `<footer>`
   - "card" → `<article>`, "section" → `<section>`
   - everything else → `<div>`

4. **Component instances** become separate sub-component files in the same
   directory, imported into the parent.

5. **Preserve text content** exactly as it appears in the schema. Convert to
   props only if the user asks.

6. **Download assets** to `assets/` via curl and reference with relative paths.

7. **Write the README** with: source (MCP URL / Figma file key / "vision"),
   date, and a token mapping table.

### tokens.css header by path

**MCP path:**
```css
/* Generated from Figma MCP — token names are authoritative, do not rename */
```

**API path:**
```css
/* Generated from Figma file: <FILE_KEY> — do not edit manually */
```

**Vision path:**
```css
/* Generated from screenshot (vision analysis) — values are estimated.
   Review and adjust before using in production. */
```

---

## Handling common edge cases

**Component variants** — component set with variants → single component with
a `variant` prop mapping to token values.

**Nested components** — generate each unique component once as its own file;
import and compose in the parent.

**Missing token values (MCP)** — if a `var(--token-name)` is referenced but
its resolved value isn't in the MCP context, leave the variable reference as-is
and add a comment: `/* value defined in design system — do not hardcode */`.

**Missing styles (API)** — inline fill with no published style name →
`--color-unnamed-N` with a node-name comment.

**Responsive layout** — Figma has no breakpoints; if asked, confirm target
breakpoints then add `@media` queries scaling padding and font sizes.

**Overflow / scroll** — `clipsContent: true` with children beyond bounds →
`overflow: hidden` (or `overflow: auto` if name suggests scrollable).

---

## Quality checklist before finishing

- [ ] MCP path: every `var(--token-name)` from the context appears verbatim in the output
- [ ] API/Vision: every color references a `--color-*` variable, not a hardcoded hex
- [ ] Every font size references a `--font-size-*` variable
- [ ] Every spacing value references a `--space-*` variable
- [ ] Auto-layout frames use flexbox with correct direction and alignment
- [ ] Assets downloaded to `assets/` and referenced with relative paths
- [ ] README includes the design source and date
- [ ] `tokens.css` has the correct path-appropriate header comment
- [ ] Component renders without TypeScript errors (`tsc --noEmit` if available)

---

## Example invocations

**User:** "Implement this design from Figma. @https://www.figma.com/design/XYZ/..."
[MCP plugin has injected CSS and token context]
→ **MCP path.** Parse context, preserve all `var(--...)` names, generate component.

**User:** "Build the card from https://www.figma.com/design/aBcDeFg/?node-id=12-345"
[No MCP context present]
→ **API path.** Check token, run curl, run extract.py, generate component.

**User:** "Here's a screenshot, build this" [attaches PNG]
→ **Vision path.** Analyse image, write vision schema, generate component.

**User:** "I have a .fig file"
→ Stop. Ask them to open it in Figma and share the URL or use the MCP plugin.

