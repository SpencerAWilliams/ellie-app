## ── CI SYNC (keeping Ellie app up to date) ────────────────────────────────

This section covers how to automatically push design changes from Figma into
the Ellie app repo without needing a paid Figma plan, a relay server, or any
tracking files committed to the repo.

### How change detection works — output hash comparison

Instead of tracking Figma version IDs, the workflow detects change by hashing
the generated `tokens.css` after extraction and comparing it to the hash of
the file already in the repo. If they match, nothing the Ellie app cares about
changed — no PR is opened. If they differ, a PR is opened with exactly the
diff a developer needs to review.

This means:
- A designer renaming a hidden layer → no PR (hash unchanged)
- A designer changing `--color-primary` from `#1A73E8` to `#0F5BD1` → PR opened
- No tracking files, no version IDs, nothing extra committed to the repo

The Figma file key is stored as a single GitHub Actions repository variable
(`FIGMA_FILE_KEY`) — visible in the Settings UI, updatable in 10 seconds when
the Figma URL changes, never touches the codebase.

---

### Shared workflow file

Both Workaround 2 and Workaround 3 use the same workflow file. Create
`.github/workflows/figma-sync.yml` in the Ellie repo:

```yaml
name: Figma design sync

on:
  workflow_dispatch:
    inputs:
      file_key:
        description: "Override Figma file key (leave blank to use repo variable)"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve file key
        id: config
        run: |
          FILE_KEY="${{ github.event.inputs.file_key }}"
          if [ -z "$FILE_KEY" ]; then
            FILE_KEY="${{ vars.FIGMA_FILE_KEY }}"
          fi
          if [ -z "$FILE_KEY" ]; then
            echo "ERROR: No Figma file key found. Set the FIGMA_FILE_KEY repo variable."
            exit 1
          fi
          echo "file_key=$FILE_KEY" >> $GITHUB_OUTPUT

      - name: Extract design from Figma
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: |
          FILE_KEY="${{ steps.config.outputs.file_key }}"

          curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
            "https://api.figma.com/v1/files/$FILE_KEY" -o /tmp/figma_file.json

          curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
            "https://api.figma.com/v1/files/$FILE_KEY/styles" -o /tmp/figma_styles.json

          python3 scripts/figma/extract.py $FILE_KEY

      - name: Check if output changed
        id: hash_check
        run: |
          # Hash the freshly generated tokens against what's in the repo
          NEW_HASH=$(sha256sum /tmp/figma_schema.json | awk '{print $1}')
          
          if [ -f "src/tokens/tokens.css" ]; then
            OLD_HASH=$(sha256sum src/tokens/tokens.css | awk '{print $1}')
          else
            OLD_HASH="none"
          fi

          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Output unchanged — no PR needed."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Output changed — will open PR."
          fi

      - name: Generate code from schema
        if: steps.hash_check.outputs.changed == 'true'
        run: |
          # Copy generated tokens into place
          mkdir -p src/tokens
          cp /tmp/figma_schema.json src/tokens/figma_schema.json

          # TODO: invoke Claude Code CLI when available
          # claude --skill figma-to-code --schema /tmp/figma_schema.json --out src/

          echo "Schema ready at src/tokens/figma_schema.json for review."

      - name: Open PR
        if: steps.hash_check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync Figma design tokens and components"
          title: "Design sync — Figma output changed"
          body: |
            Automated design sync. The extracted design output changed since
            the last sync — review the token and component diffs below before merging.

            **Figma file key:** `${{ steps.config.outputs.file_key }}`
            **Triggered by:** ${{ github.actor }}
            **Hash before:** `${{ steps.hash_check.outputs.old_hash }}`
            **Hash after:** `${{ steps.hash_check.outputs.new_hash }}`
          branch: figma-sync/auto
          delete-branch: true
```

---

### Setup (one-time, both workarounds)

**1. Add repo secrets and variables**

Go to the Ellie app repo → Settings → Secrets and variables → Actions.

Under **Secrets**, add:
- `FIGMA_ACCESS_TOKEN` — your Figma personal access token

Under **Variables**, add:
- `FIGMA_FILE_KEY` — the file key from your Figma URL
  (e.g. from `figma.com/design/aBcDeFgH12345/...` → `aBcDeFgH12345`)

When the Figma URL changes, update `FIGMA_FILE_KEY` here — no code change needed.

**2. Copy extract.py into the repo**

```bash
mkdir -p scripts/figma
cp "C:\Users\spencer.a.williams\Desktop\EliLily\fig-code-V2\extract.py" scripts/figma/extract.py
git add scripts/figma/extract.py
git commit -m "chore: add Figma extraction script"
```

---

### Workaround 2 — Designer triggers from inside Figma (recommended)

**How it works:** Designer installs the "Run GitHub Actions Workflows" Figma
community plugin. When a design update is ready for dev, they click one button
inside Figma. The plugin calls the GitHub API and dispatches the workflow.
No relay server, no paid plan, no polling delay.

**Setup (additional step for Workaround 2 only)**

Create a GitHub PAT scoped to the Ellie repo with `Actions: Read and Write`
permission. In Figma: Main menu → Plugins → Browse plugins → search
"Run GitHub Actions Workflows" → Install. Configure it with:
- Repository: `your-org/ellie-app`
- Workflow file: `figma-sync.yml`
- Branch: `main`
- GitHub token: the PAT you just created

**Designer workflow after setup:**
1. Make design changes in Figma
2. Open the plugin → click **Run workflow**
3. If hash changed → PR appears in the repo within ~2 minutes
4. If hash unchanged → workflow exits cleanly, no PR

---

### Workaround 3 — Manual trigger from GitHub (zero-setup fallback)

**How it works:** Navigate to the Actions tab in GitHub and click
"Run workflow." No plugin, no extra config. Use this during early development
or whenever the Figma plugin isn't available.

Bookmark this URL for the team:
```
https://github.com/your-org/ellie-app/actions/workflows/figma-sync.yml
```

Or add a one-click badge to your project README or Notion:
```markdown
[![Sync Figma](https://img.shields.io/badge/Sync-Figma%20→%20Code-brightgreen)](https://github.com/your-org/ellie-app/actions/workflows/figma-sync.yml)
```

---

### Comparison

| | Workaround 2 (Figma plugin) | Workaround 3 (Manual) |
|---|---|---|
| Trigger location | Inside Figma | GitHub Actions tab |
| Extra setup | ~10 min (PAT + plugin) | Zero |
| Designer needs GitHub access | No | Yes |
| Best for | Regular ongoing syncs | Early dev / one-off syncs |

Both use identical workflow logic and the same hash-based no-op guard —
the only difference is how the workflow is triggered.

Start with Workaround 3 to validate the pipeline end-to-end, then switch
to Workaround 2 once the team is happy with the sync output.