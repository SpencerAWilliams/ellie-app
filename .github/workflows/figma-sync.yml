name: Figma design sync

on:
  workflow_dispatch:
    inputs:
      file_key:
        description: "Override Figma file key"
        required: false
      fileKey:
        description: "Figma file key (from plugin)"
        required: false
      page:
        description: "Figma page (from plugin)"
        required: false
      selection:
        description: "Figma selection (from plugin)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve file key
        id: config
        run: |
          FILE_KEY="${{ github.event.inputs.fileKey }}"
          if [ -z "$FILE_KEY" ]; then
            FILE_KEY="${{ github.event.inputs.file_key }}"
          fi
          if [ -z "$FILE_KEY" ]; then
            FILE_KEY="${{ vars.FIGMA_FILE_KEY }}"
          fi
          if [ -z "$FILE_KEY" ]; then
            echo "ERROR: No Figma file key found. Set the FIGMA_FILE_KEY repo variable."
            exit 1
          fi
          echo "file_key=$FILE_KEY" >> $GITHUB_OUTPUT

      - name: Fetch Figma file (single call, with retry)
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
        run: |
          FILE_KEY="${{ steps.config.outputs.file_key }}"

          fetch_figma() {
            curl -s -w "\n%{http_code}" \
              -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
              "https://api.figma.com/v1/files/$FILE_KEY"
          }

          MAX_ATTEMPTS=4
          DELAY=15

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $attempt of $MAX_ATTEMPTS..."
            RESPONSE=$(fetch_figma)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "$BODY" > /tmp/figma_file.json
              echo "Figma file fetched successfully."
              break
            elif [ "$HTTP_CODE" = "429" ]; then
              if [ $attempt -lt $MAX_ATTEMPTS ]; then
                echo "Rate limited (429). Waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              else
                echo "ERROR: Still rate limited after $MAX_ATTEMPTS attempts."
                exit 1
              fi
            else
              echo "ERROR: Figma API returned HTTP $HTTP_CODE"
              echo "$BODY" | head -c 500
              exit 1
            fi
          done

          echo "--- Figma API response preview ---"
          cat /tmp/figma_file.json | head -c 500

      - name: Assemble design schema
        run: |
          python3 scripts/figma/extract.py ${{ steps.config.outputs.file_key }}

      - name: Check if output changed
        id: hash_check
        run: |
          NEW_HASH=$(sha256sum /tmp/figma_schema.json | awk '{print $1}')

          if [ -f "src/tokens/figma_schema.json" ]; then
            OLD_HASH=$(sha256sum src/tokens/figma_schema.json | awk '{print $1}')
          else
            OLD_HASH="none"
          fi

          echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
          echo "old_hash=$OLD_HASH" >> $GITHUB_OUTPUT

          if [ "$NEW_HASH" = "$OLD_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Schema unchanged — no PR needed."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Schema changed — will generate code and open PR."
          fi

      - name: Install Claude Code CLI
        if: steps.hash_check.outputs.changed == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate code from schema
        if: steps.hash_check.outputs.changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p src/tokens src/components
          cp /tmp/figma_schema.json src/tokens/figma_schema.json
          claude --print --dangerously-skip-permissions \
            "You are running in CI. Read the design schema at src/tokens/figma_schema.json and follow the figma-to-code skill to generate the component. Output all files to src/components/. Use the API path code generation rules from the skill." \
            --allowedTools "Read,Write,Bash"

      - name: Open PR
        if: steps.hash_check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync Figma design tokens and components"
          title: "Design sync — Figma output changed"
          body: |
            Automated design sync. The extracted design schema changed since
            the last sync — review the token and component diffs below before merging.

            **Figma file key:** `${{ steps.config.outputs.file_key }}`
            **Triggered by:** ${{ github.actor }}
            **Hash before:** `${{ steps.hash_check.outputs.old_hash }}`
            **Hash after:** `${{ steps.hash_check.outputs.new_hash }}`
          branch: figma-sync/auto
          delete-branch: true