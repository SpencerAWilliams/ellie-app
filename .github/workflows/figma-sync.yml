## ── API PATH (Fallback — no MCP plugin) ───────────────────────────────────

## Prerequisites

The Figma REST API requires a personal access token. Check if it is set:

```bash
echo $FIGMA_ACCESS_TOKEN
```

If empty, ask the user:

> "I need a Figma personal access token to access the design. You can create
> one at figma.com → Settings → Security → Personal access tokens. Please
> paste it here and I'll set it for this session."

```bash
export FIGMA_ACCESS_TOKEN="<token the user provided>"
```

Never hardcode the token in any generated file.

---

## Step 1 — Parse the Figma URL

Figma URLs follow this pattern:

```
https://www.figma.com/design/<FILE_KEY>/Title?node-id=<NODE_ID>
```

Extract the file key and node ID. If the user gave only a file key, use it
directly. If no `node-id` is present and the file has multiple frames, ask:

> "I can see frames: Landing Page, Onboarding, Dashboard. Which should I build?"

---

## Step 2 — Extract the design data

### 2a. Node tree

```bash
curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
  "https://api.figma.com/v1/files/${FILE_KEY}" \
  -o /tmp/figma_file.json

# If targeting a specific node:
curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
  "https://api.figma.com/v1/files/${FILE_KEY}/nodes?ids=${NODE_ID}" \
  -o /tmp/figma_nodes.json
```

### 2b. Published styles

```bash
curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
  "https://api.figma.com/v1/files/${FILE_KEY}/styles" \
  -o /tmp/figma_styles.json
```

### 2c. Image exports

```bash
curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
  "https://api.figma.com/v1/images/${FILE_KEY}?ids=${IMAGE_NODE_IDS}&format=svg" \
  -o /tmp/figma_images_svg.json

curl -s -H "X-Figma-Token: $FIGMA_ACCESS_TOKEN" \
  "https://api.figma.com/v1/images/${FILE_KEY}?ids=${RASTER_NODE_IDS}&format=png&scale=2" \
  -o /tmp/figma_images_png.json
```

---

## Step 3 — Assemble the design schema

Run the extraction script bundled with this skill:

```bash
# Without a specific node (uses first frame on page 1)
python3 "C:\Users\spencer.a.williams\Desktop\EliLily\fig-code-V2\extract.py" $FILE_KEY

# Targeting a specific node
python3 "C:\Users\spencer.a.williams\Desktop\EliLily\fig-code-V2\extract.py" $FILE_KEY --node $NODE_ID
```

The script reads the files from Step 2 and writes `/tmp/figma_schema.json`.
Proceed to Step 4.

