# Figma to Code

## Overview

This skill turns a Figma design or UI screenshot into a working code component.
It has three paths — always use the highest one available:

| Priority | Input | Path | Accuracy |
|---|---|---|---|
| 1st | Figma MCP plugin context | **MCP path** (Step M) | Exact + token names |
| 2nd | Figma URL or file key | **API path** (Steps 1–4) | Exact — pixel values |
| 3rd | PNG / screenshot / image | **Vision path** (Step V) | Good — estimated |

Read this entire file before running any bash command or writing any code.

---

## INPUT ROUTING

Before doing anything else, identify what the user has provided:

**→ Figma MCP plugin data** — the user's prompt contains `@https://www.figma.com/...`
OR the Claude Code context window contains layer properties, CSS code blocks,
or token names (e.g. `var(--lds-g-color-...)`) injected by the Figma MCP
plugin: go to **Step M**.

**→ Figma URL** (contains `figma.com/design/` or `figma.com/file/`) with no
MCP context: go to **Step 1**.

**→ File key only** (~22-character alphanumeric string, no URL): go to **Step 1**.

**→ PNG, JPG, WEBP, or any image file**: go to **Step V**.

**→ Anything else** (`.fig` binary, Make/Integromat file, Sketch file): stop
and tell the user:
> "This skill supports the Figma MCP plugin, Figma URLs, Figma file keys, and
> PNG screenshots. `.fig` binaries, Make scenarios, and Sketch files aren't
> supported. For a `.fig` file, open it in Figma and share the resulting URL."

---

## ── MCP PATH (Primary) ─────────────────────────────────────────────────────

## Step M — Extract design data from MCP context

The Figma MCP plugin (figma.com/community/plugin/1454202915935387349) connects
Figma directly to Claude Code. When active, it injects the selected layer's
full design data — CSS properties, token names, layout values, and the Figma
URL — into the Claude Code context automatically. No curl commands, no API
token, no extract.py needed.

### What the MCP plugin provides

The plugin injects a context block that includes:

- **The Figma URL** with the exact node ID selected (`@https://www.figma.com/design/<FILE_KEY>/...?node-id=<NODE_ID>`)
- **Layer properties in CSS** — layout (`flex`, `gap`, `padding`), typography
  (`font-family`, `font-size`, `font-weight`, `color`), sizing, and effects
- **Real design token names** as CSS custom properties (e.g.
  `var(--lds-g-color-neutral-base)`, `var(--lds-g-font-size-body)`) — these
  are the actual token variable names from the design system, not invented ones
- **Component name and layer hierarchy** visible in the selection details

### M1 — Parse the MCP context

Read the injected context carefully and extract:

1. **Component name** — from the layer name in selection details
2. **Token names** — every `var(--...)` reference is a real design token;
   collect them all. These go directly into `tokens.css` as-is — do not
   rename or invent values for them
3. **Layout CSS** — `flex`, `flex-direction`, `gap`, `padding`, `width`,
   `height`, `align-items`, `justify-content`
4. **Typography CSS** — `font-family`, `font-size`, `font-weight`,
   `line-height`, `color`, `text-align`
5. **Visual properties** — `border-radius`, `box-shadow`, `opacity`,
   `background`, `border`
6. **Figma URL + node ID** — record these for the README

### M2 — Request additional layers if needed

The MCP plugin injects data for the **currently selected layer**. If the
design has multiple sibling components or child layers not yet provided, ask
the user:

> "I have the CSS for the outer container. To build this accurately, can you
> select each child layer in Figma and share the MCP context for:
> [list the layers you can infer exist but don't have data for]"

Continue once you have enough context to reproduce the full design, or
proceed with what's available and note any gaps in the README.

### M3 — Build the MCP schema

Assemble the extracted data into the standard schema format and write it
to `/tmp/figma_schema.json`:

```python
import json

schema = {
  "meta": {
    "file_key": "<from URL>",
    "target_node": "<node-id from URL>",
    "component_name": "<layer name>",
    "source": "mcp",
    "figma_url": "<full URL>",
    "accuracy": "exact"
  },
  "tokens": {
    # Use REAL token names exactly as they appear in var(--...) references.
    # If a property uses a token, record it here. If it uses a raw value,
    # record that raw value under a descriptive key.
    "colors": {
      "--color-neutral-base": "var(--lds-g-color-neutral-base)",
      # ... all color tokens
    },
    "typography": {
      "--font-family-body": "var(--lds-g-font-family-base)",
      "--font-size-body":   "var(--lds-g-font-size-body)",
      # ...
    },
    "spacing": {
      "--space-md": "16px",   # use raw values if no token exists
      # ...
    },
    "radii":   { "--radius-md": "8px" },
    "shadows": { "--shadow-card": "0 1px 4px rgba(0,0,0,0.12)" }
  },
  "css_blocks": {
    # Paste the raw CSS blocks from the MCP context verbatim, keyed by
    # category. Claude Code will use these as the ground truth for Step 4.
    "layout":     "flex: 1 0 0;",
    "typography": "color: var(--lds-g-color-neutral-base);\nfont-family: var(--lds-g-font-family-base);\nfont-size: var(--lds-g-font-size-body);"
  },
  "tree": {
    # Build from the layer hierarchy visible in the MCP context
  },
  "assets": {}
}

with open("/tmp/figma_schema.json", "w") as f:
    json.dump(schema, f, indent=2)
print("MCP schema written.")
```

### M4 — Proceed to Step 4

Go directly to **Step 4 — Generate the code**. Skip Steps 1–3 entirely.

**Key rule for MCP output:** when a CSS property uses a `var(--token-name)`,
the generated code must use that exact variable name. Never replace a token
reference with a hardcoded value.

